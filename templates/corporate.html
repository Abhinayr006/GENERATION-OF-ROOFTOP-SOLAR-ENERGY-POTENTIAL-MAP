{% extends "base.html" %}

{% block title %}Corporate Solar Estimator{% endblock %}

{% block content %}
<div class="page-container">
    <div class="page-header">
        <h1>🏢 Corporate Solar Estimator</h1>
        <div class="mode-badge">{{ mode | upper }} UNet</div>
    </div>
    
    <div class="form-container">
        <form method="POST">
            <input type="hidden" name="mode" value="{{ mode }}">
            <div class="form-group">
                <label for="city">Select City:</label>
                <select id="city" name="city" required>
                    <option value="">Choose a city...</option>
                    {% for city in cities %}
                        <option value="{{ city }}">{{ city }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn-primary">🚀 Run {{ mode | title }} Corporate Model</button>
        </form>
    </div>

    {% if output %}
    <div class="output-container">
        <h3>📊 Results:</h3>
        <pre class="output">{{ output }}</pre>
    </div>
    {% endif %}
    
    <div class="back-link">
        <a href="/">← Back to Home</a>
    </div>
</div>
{% endblock %}
